<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一意解を保証した9×9数独問題をランダム生成するWebアプリ">
  <title>毎日の数独</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="masthead">
      <p class="date-line" id="dateLine"></p>
      <h1>毎日の数独</h1>
      <p class="subtitle">9 × 9 Number Place</p>
    </header>

    <section class="toolbar" aria-label="問題の設定">
      <label for="difficulty">難易度</label>
      <select id="difficulty">
        <option value="beginner">初級（空白 35〜40）</option>
        <option value="intermediate">中級（空白 41〜48）</option>
        <option value="advanced">上級（空白 49〜54）</option>
        <option value="expert">激ムズ（空白 55〜58）</option>
      </select>
      <button type="button" id="newGameButton" class="primary">新しい問題</button>
    </section>

    <section class="game" aria-label="数独盤面">
      <div class="status" id="status" role="status" aria-live="polite">問題を作成しています…</div>
      <div class="board-wrap">
        <div class="board" id="board" aria-label="9かける9の数独"></div>
        <div class="loading" id="loading" aria-hidden="true">
          <span class="spinner"></span>
          <span>一意解を確認中…</span>
        </div>
      </div>

      <div class="input-panel" aria-label="数字入力パネル">
        <div class="mode-toggle" role="group" aria-label="入力モード">
          <button type="button" id="normalModeButton" class="mode-button active" aria-pressed="true">通常入力</button>
          <button type="button" id="memoModeButton" class="mode-button" aria-pressed="false">メモ入力</button>
        </div>
        <div class="number-pad" id="numberPad" aria-label="数字ボタン"></div>
        <button type="button" id="deleteButton" class="delete-button">削除</button>
      </div>

      <div class="actions">
        <button type="button" id="checkButton">正解チェック</button>
        <button type="button" id="answerButton">答えを見る</button>
      </div>
    </section>

    <aside class="rules">
      <h2>遊び方</h2>
      <p>縦・横・太線で囲まれた3×3の枠内に、1から9までの数字を重複しないように入れてください。</p>
    </aside>

    <footer>
      <p>すべての問題は生成時に一意解を確認しています。</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
